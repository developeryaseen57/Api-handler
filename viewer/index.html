<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Watcher</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080810;
      --surface:   #0e0e1a;
      --surface2:  #13131f;
      --border:    #1e1e30;
      --border2:   #252538;
      --text:      #c8c8e0;
      --muted:     #4a4a6a;
      --accent:    #7b5ea7;
      --accent2:   #a78bfa;
      --green:     #34d399;
      --green-bg:  #052e1c;
      --orange:    #fb923c;
      --orange-bg: #2c1400;
      --red:       #f87171;
      --red-bg:    #2d0a0a;
      --blue:      #60a5fa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOPBAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      position: relative;
    }

    #topbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent) 40%, var(--accent2) 60%, transparent);
      opacity: 0.4;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent2); }
      50%       { opacity: 0.5; box-shadow: 0 0 2px var(--accent2); }
    }

    .top-stats {
      display: flex;
      gap: 24px;
      font-size: 11px;
      color: var(--muted);
    }

    .stat-item span { color: var(--text); font-weight: 500; }

    .top-actions { display: flex; gap: 8px; }

    /* ── MAIN LAYOUT ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    #list {
      width: 400px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }

    #list-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    #items {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }

    #items::-webkit-scrollbar { width: 4px; }
    #items::-webkit-scrollbar-track { background: transparent; }
    #items::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── LIST ITEM ── */
    .item {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }

    .item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: transparent;
      transition: background 0.12s;
    }

    .item:hover { background: var(--surface2); }
    .item:hover::before { background: var(--border2); }
    .item.active { background: #12122a; }
    .item.active::before { background: var(--accent2); }
    .item.is-error::before { background: var(--red); }
    .item.is-error.active::before { background: var(--red); }

    .item-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.03em;
    }

    .s2 { background: var(--green-bg);  color: var(--green);  }
    .s4 { background: var(--orange-bg); color: var(--orange); }
    .s5 { background: var(--red-bg);    color: var(--red);    }

    .method-tag {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent2);
      min-width: 36px;
    }

    .url-text {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .err-tag {
      font-size: 9px;
      font-weight: 600;
      color: var(--red);
      background: var(--red-bg);
      padding: 1px 5px;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }

    .item-meta {
      display: flex;
      gap: 10px;
      font-size: 10px;
      color: var(--muted);
    }

    .duration-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0 5px;
      border-radius: 3px;
      font-size: 10px;
    }

    /* ── RIGHT PANEL ── */
    #detail {
      flex: 1;
      padding: 28px 32px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }

    #detail::-webkit-scrollbar { width: 4px; }
    #detail::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 32px;
      opacity: 0.3;
    }

    .empty-text {
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    /* detail sections */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .detail-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .detail-grid.full { grid-template-columns: 1fr; }

    .field {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .field-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--muted);
      padding: 8px 12px 6px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      background: var(--surface2);
    }

    .field-value {
      padding: 10px 12px;
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }

    pre.field-value {
      white-space: pre-wrap;
      word-break: break-all;
      overflow-x: auto;
    }

    .field.error-field { border-color: #3d1515; }
    .field.error-field .field-label { background: #1a0a0a; color: var(--red); }
    pre.error-stack { color: #f87171cc; font-size: 11px; }

    /* ── BUTTONS ── */
    .btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.12s;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent2); background: #12122a; }
    .btn.active { border-color: var(--accent); color: var(--accent2); background: #12122a; }
    .btn.danger { border-color: #3d1515; color: var(--red); }
    .btn.danger:hover { background: var(--red-bg); border-color: var(--red); }
    .btn.refresh { border-color: #1a2e1a; color: var(--green); }
    .btn.refresh:hover { background: var(--green-bg); border-color: var(--green); }

    /* ── EMPTY COUNT ── */
    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 16px;
      padding: 0 5px;
      border-radius: 8px;
      font-size: 9px;
      font-weight: 600;
      background: var(--border2);
      color: var(--muted);
      margin-left: 4px;
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    API WATCHER
  </div>
  <div class="top-stats">
    <div class="stat-item">TOTAL <span id="stat-total">0</span></div>
    <div class="stat-item">ERRORS <span id="stat-errors" style="color:var(--red)">0</span></div>
    <div class="stat-item">OK <span id="stat-ok" style="color:var(--green)">0</span></div>
  </div>
  <div class="top-actions">
    <button class="btn refresh" onclick="load()">↻ REFRESH</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT -->
  <div id="list">
    <div id="list-header">
      <button class="btn active" id="f-all"     onclick="setFilter('all')">All <span class="count-badge" id="c-all">0</span></button>
      <button class="btn"        id="f-request" onclick="setFilter('request')">Requests <span class="count-badge" id="c-request">0</span></button>
      <button class="btn"        id="f-error"   onclick="setFilter('error')">Errors <span class="count-badge" id="c-error">0</span></button>
      <button class="btn danger" onclick="clearLogs()">✕ Clear</button>
    </div>
    <div id="items"></div>
  </div>

  <!-- RIGHT -->
  <div id="detail">
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-text">SELECT A REQUEST TO INSPECT</div>
    </div>
  </div>

</div>

<script>
  let logs = [];
  let currentFilter = 'all';
  let selectedIndex = null;

  async function load() {
    try {
      const res = await fetch('/logs');
      logs = await res.json();
      updateStats();
      render();
    } catch (e) {
      console.error('Failed to load logs', e);
    }
  }

  function updateStats() {
    const errors = logs.filter(s => s.type === 'error').length;
    document.getElementById('stat-total').textContent  = logs.length;
    document.getElementById('stat-errors').textContent = errors;
    document.getElementById('stat-ok').textContent     = logs.length - errors;
    document.getElementById('c-all').textContent       = logs.length;
    document.getElementById('c-request').textContent   = logs.filter(s => s.type === 'request').length;
    document.getElementById('c-error').textContent     = errors;
  }

  function setFilter(filter) {
    currentFilter = filter;
    selectedIndex = null;
    document.querySelectorAll('#list-header .btn').forEach(b => b.classList.remove('active'));
    const el = document.getElementById('f-' + filter);
    if (el) el.classList.add('active');
    document.getElementById('detail').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <div class="empty-text">SELECT A REQUEST TO INSPECT</div>
      </div>`;
    render();
  }

  function render() {
    const filtered = getFiltered();
    const container = document.getElementById('items');

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state" style="margin-top:60px"><div class="empty-icon">○</div><div class="empty-text">NO ENTRIES</div></div>`;
      return;
    }

    container.innerHTML = filtered.map((s, i) => `
      <div class="item ${s.type === 'error' ? 'is-error' : ''} ${selectedIndex === i ? 'active' : ''}"
           onclick="showDetail(${i})">
        <div class="item-top">
          <span class="badge ${statusClass(s.status)}">${s.status}</span>
          <span class="method-tag">${s.method}</span>
          <span class="url-text">${s.url}</span>
          ${s.type === 'error' ? '<span class="err-tag">ERR</span>' : ''}
        </div>
        <div class="item-meta">
          <span class="duration-pill">${s.duration}</span>
          <span>${formatTime(s.timestamp)}</span>
        </div>
      </div>
    `).join('');
  }

  function getFiltered() {
    return logs.filter(s => currentFilter === 'all' ? true : s.type === currentFilter);
  }

  function showDetail(i) {
    selectedIndex = i;
    document.querySelectorAll('.item').forEach((el, idx) => {
      el.classList.toggle('active', idx === i);
    });

    const s = getFiltered()[i];

    document.getElementById('detail').innerHTML = `
      <div class="detail-header">
        <span class="badge ${statusClass(s.status)}" style="font-size:12px;padding:4px 10px">${s.status}</span>
        <span class="detail-title">${s.method} ${s.url}</span>
      </div>

      <div class="detail-grid">
        <div class="field">
          <div class="field-label">Status · Duration</div>
          <div class="field-value">${s.status} &nbsp;·&nbsp; ${s.duration}</div>
        </div>
        <div class="field">
          <div class="field-label">Timestamp</div>
          <div class="field-value">${new Date(s.timestamp).toLocaleString()}</div>
        </div>
      </div>

      <div class="detail-grid full">
        <div class="field">
          <div class="field-label">Request Body</div>
          <pre class="field-value">${JSON.stringify(s.requestBody, null, 2) || '{}'}</pre>
        </div>
      </div>

      <div class="detail-grid full">
        <div class="field">
          <div class="field-label">Response Body</div>
          <pre class="field-value">${JSON.stringify(s.responseBody, null, 2)}</pre>
        </div>
      </div>

      ${s.type === 'error' ? `
      <div class="detail-grid full">
        <div class="field error-field">
          <div class="field-label">⚠ Error Message</div>
          <div class="field-value" style="color:var(--red)">${s.errorMessage}</div>
        </div>
      </div>
      <div class="detail-grid full">
        <div class="field error-field">
          <div class="field-label">⚠ Stack Trace</div>
          <pre class="field-value error-stack">${s.errorStack}</pre>
        </div>
      </div>` : ''}
    `;
  }

  async function clearLogs() {
    await fetch('/logs', { method: 'DELETE' });
    logs = [];
    selectedIndex = null;
    updateStats();
    render();
    document.getElementById('detail').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <div class="empty-text">SELECT A REQUEST TO INSPECT</div>
      </div>`;
  }

  function statusClass(s) {
    if (s >= 500) return 's5';
    if (s >= 400) return 's4';
    return 's2';
  }

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString();
  }

  load();
  setInterval(load, 5000);
</script>
</body>
</html>
